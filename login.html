<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In — OrgMember</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg-dark:      #0b1628;
      --bg-card:      #11213a;
      --accent:       #f5a623;
      --accent-hover: #e09520;
      --accent-light: rgba(245,166,35,0.12);
      --text-white:   #ffffff;
      --text-muted:   #8fa8c8;
      --text-dim:     #5a7a9a;
      --border:       rgba(255,255,255,0.07);
      --radius:       12px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    body {
      background: var(--bg-dark);
      color: var(--text-white);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    h1, h2 { font-family: 'Playfair Display', serif; font-weight: 700; }

    .login-container {
      width: 100%;
      max-width: 400px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .login-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--text-white);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
    }

    .brand-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: var(--bg-dark);
    }

    .login-title {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .login-subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    /* Form Group */
    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-white);
      margin-bottom: 6px;
    }

    .form-control {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-white);
      padding: 11px 14px;
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-control::placeholder {
      color: var(--text-dim);
    }

    .form-control:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(245,166,35,0.1);
      background: var(--bg-card);
      color: var(--text-white);
    }

    /* Forgot Password + Remember */
    .form-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      margin-bottom: 24px;
    }

    .form-check {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 0;
    }

    .form-check input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--accent);
    }

    .form-check label {
      color: var(--text-muted);
      cursor: pointer;
      margin: 0;
      font-size: 0.8rem;
    }

    .forgot-link {
      color: var(--accent);
      text-decoration: none;
      transition: color 0.2s;
    }

    .forgot-link:hover {
      color: var(--accent-hover);
    }

    /* Buttons */
    .btn-login {
      width: 100%;
      background: var(--accent);
      border: none;
      color: var(--bg-dark);
      padding: 11px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-family: 'Inter', sans-serif;
      margin-bottom: 20px;
    }

    .btn-login:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
    }

    /* Footer Links */
    .login-footer {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .login-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }

    /* Error Message */
    .error-message {
      background: rgba(255,107,107,0.12);
      border: 1px solid rgba(255,107,107,0.3);
      color: #ff6b6b;
      padding: 10px 12px;
      border-radius: var(--radius);
      font-size: 0.8rem;
      margin-bottom: 20px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      background: rgba(76,209,119,0.12);
      border: 1px solid rgba(76,209,119,0.3);
      color: #4cd177;
      padding: 10px 12px;
      border-radius: var(--radius);
      font-size: 0.8rem;
      margin-bottom: 20px;
      display: none;
    }

    .success-message.show {
      display: block;
    }
  </style>
</head>
<body>

  <div class="login-container">

    <div class="login-header">
      <a href="index.html" class="login-logo">
        <div class="brand-icon"><i class="bi bi-diagram-3-fill"></i></div>
        OrgMember
      </a>
      <h1 class="login-title">Welcome Back</h1>
      <p class="login-subtitle">Sign in to your account</p>
    </div>

    <div class="error-message" id="errorMsg"></div>
    <div class="success-message" id="successMsg"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input
          type="email"
          class="form-control"
          id="email"
          placeholder="your@email.com"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input
          type="password"
          class="form-control"
          id="password"
          placeholder="Enter your password"
          required
        />
      </div>

      <div class="form-footer">
        <div class="form-check">
          <input type="checkbox" id="remember" />
          <label for="remember">Remember me</label>
        </div>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>

    </form>

    <div class="login-footer">
      Don't have an account? <a href="register.html">Create one</a>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  function handleLogin(event) {
    event.preventDefault();

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!email || !password) {
      showError('Please fill in all fields');
      return;
    }

    // Send login request to backend
    fetch('/api/auth/login', {
      method:      'POST',
      headers:     { 'Content-Type': 'application/json' },
      credentials: 'include',
      body:        JSON.stringify({ email, password })
    })
    .then(res => res.json())
    .then(data => {
      if (data.success) {
        showSuccess('Login successful! Redirecting...');
        // Redirect to backend-served dashboard
        setTimeout(() => {
          window.location.href = `${data.redirect}`;
        }, 1000);
      } else {
        showError(data.message);
      }
    })
    .catch(err => {
      showError('Cannot connect to server. Make sure backend is running!');
    });
  }

  function showError(msg) {
    const box = document.getElementById('errorMsg');
    box.textContent = msg;
    box.classList.add('show');
    setTimeout(() => box.classList.remove('show'), 5000);
  }

  function showSuccess(msg) {
    const box = document.getElementById('successMsg');
    box.textContent = msg;
    box.classList.add('show');
  }
</script>

</body>
</html>
