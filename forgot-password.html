<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password — OrgMember</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg-dark:      #0b1628;
      --bg-card:      #11213a;
      --accent:       #f5a623;
      --accent-hover: #e09520;
      --text-white:   #ffffff;
      --text-muted:   #8fa8c8;
      --text-dim:     #5a7a9a;
      --border:       rgba(255,255,255,0.07);
      --radius:       12px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    body {
      background: var(--bg-dark);
      color: var(--text-white);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    h1, h2 { font-family: 'Playfair Display', serif; font-weight: 700; }

    .login-container {
      width: 100%;
      max-width: 400px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .login-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--text-white);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
    }

    .brand-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: var(--bg-dark);
    }

    .login-title {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .login-subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-white);
      margin-bottom: 6px;
    }

    .form-control {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-white);
      padding: 11px 14px;
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-control::placeholder {
      color: var(--text-dim);
    }

    .form-control:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(245,166,35,0.1);
      background: var(--bg-card);
      color: var(--text-white);
    }

    .btn-login {
      width: 100%;
      background: var(--accent);
      border: none;
      color: var(--bg-dark);
      padding: 11px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-family: 'Inter', sans-serif;
      margin-bottom: 20px;
      margin-top: 10px;
    }

    .btn-login:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
    }

    .login-footer {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .login-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }

    .error-message {
      background: rgba(255,107,107,0.12);
      border: 1px solid rgba(255,107,107,0.3);
      color: #ff6b6b;
      padding: 10px 12px;
      border-radius: var(--radius);
      font-size: 0.8rem;
      margin-bottom: 20px;
      display: none;
    }
    .error-message.show { display: block; }

    .success-message {
      background: rgba(76,209,119,0.12);
      border: 1px solid rgba(76,209,119,0.3);
      color: #4cd177;
      padding: 10px 12px;
      border-radius: var(--radius);
      font-size: 0.8rem;
      margin-bottom: 20px;
      display: none;
    }
    .success-message.show { display: block; }
  </style>
</head>
<body>

  <div class="login-container">

    <div class="login-header">
      <a href="index.html" class="login-logo">
        <div class="brand-icon"><i class="bi bi-diagram-3-fill"></i></div>
        OrgMember
      </a>
      <h1 class="login-title">Reset Password</h1>
      <p class="login-subtitle">Enter your email to receive a reset link</p>
    </div>

    <div class="error-message" id="errorMsg"></div>
    <div class="success-message" id="successMsg"></div>

    <form id="forgotForm" onsubmit="handleForgot(event)">

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input
          type="email"
          class="form-control"
          id="email"
          placeholder="your@email.com"
          required
        />
      </div>

      <button type="submit" class="btn-login" id="submitBtn">
        <i class="bi bi-envelope me-2"></i>Send Reset Link
      </button>

    </form>

    <div class="login-footer">
      Remember your password? <a href="login.html">Sign in</a>
    </div>

  </div>

  <script>
    function handleForgot(event) {
      event.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      if (!email) {
        showError('Please enter your email address');
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="bi bi-hourglass-split me-2"></i>Sending...';

      fetch('/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          showSuccess(data.message);
          document.getElementById('forgotForm').reset();
        } else {
          showError(data.message);
        }
      })
      .catch(err => {
        showError('Cannot connect to server. Try again later.');
      })
      .finally(() => {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-envelope me-2"></i>Send Reset Link';
      });
    }

    function showError(msg) {
      const box = document.getElementById('errorMsg');
      box.textContent = msg;
      box.classList.add('show');
      setTimeout(() => box.classList.remove('show'), 5000);
    }

    function showSuccess(msg) {
      const box = document.getElementById('successMsg');
      box.textContent = msg;
      box.classList.add('show');
    }
  </script>
</body>
</html>
