<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — OrgMember</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg-dark:      #0b1628;
      --bg-card:      #11213a;
      --accent:       #f5a623;
      --accent-hover: #e09520;
      --accent-light: rgba(245,166,35,0.12);
      --text-white:   #ffffff;
      --text-muted:   #8fa8c8;
      --text-dim:     #5a7a9a;
      --border:       rgba(255,255,255,0.10);
      --radius:       10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-dark);
      color: var(--text-white);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 16px;
    }

    h1, h2 { font-family: 'Playfair Display', serif; font-weight: 700; }

    /* ── Card ── */
    .register-card {
      width: 100%;
      max-width: 500px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
    }

    /* ── Header ── */
    .card-header-custom {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      margin-bottom: 20px;
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--text-white);
    }

    .brand-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: var(--bg-dark);
    }

    .card-title {
      font-size: 1.7rem;
      margin-bottom: 6px;
    }

    .card-subtitle {
      font-size: 0.88rem;
      color: var(--text-muted);
    }

    /* ── Google Button ── */
    .btn-google {
      width: 100%;
      background: #ffffff;
      border: none;
      color: #333;
      padding: 10px;
      border-radius: var(--radius);
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background 0.2s;
      margin-bottom: 20px;
    }
    .btn-google:hover { background: #f0f0f0; }
    .google-icon {
      width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-dim);
      font-size: 0.8rem;
      margin-bottom: 20px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Form ── */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-align: center;
    }

    .form-control {
      width: 100%;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      color: var(--text-white);
      padding: 10px 13px;
      border-radius: var(--radius);
      font-size: 0.88rem;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
      appearance: none;
      -webkit-appearance: none;
    }

    .form-control::placeholder { color: var(--text-dim); }

    .form-control:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(245,166,35,0.08);
      background: var(--bg-dark);
      color: var(--text-white);
    }

    /* Custom Select */
    .select-wrapper {
      position: relative;
    }
    .select-wrapper select {
      width: 100%;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      color: var(--text-white);
      padding: 10px 36px 10px 13px;
      border-radius: var(--radius);
      font-size: 0.88rem;
      font-family: 'Inter', sans-serif;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .select-wrapper select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(245,166,35,0.08);
    }
    .select-wrapper select option {
      background: var(--bg-card);
      color: var(--text-white);
    }
    .select-wrapper::after {
      content: '\f282';
      font-family: 'bootstrap-icons';
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      pointer-events: none;
      font-size: 0.8rem;
    }

    /* ── Native Number Spinner styling ── */
    input[type="number"] {
      -moz-appearance: textfield; /* Firefox: keep arrows visible */
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      opacity: 1;
      cursor: pointer;
      height: 38px;
      background: var(--bg-card);
      border-left: 1px solid var(--border);
    }

    /* ── Password Fields ── */
    .password-wrapper {
      position: relative;
    }
    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0;
      transition: color 0.2s;
    }
    .password-toggle:hover { color: var(--accent); }
    .password-wrapper .form-control { padding-right: 38px; }

    /* ── Terms ── */
    .terms-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 18px;
      font-size: 0.78rem;
    }
    .terms-row input[type="checkbox"] {
      width: 15px; height: 15px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .terms-row label {
      color: var(--text-muted);
      cursor: pointer;
      line-height: 1.5;
    }
    .terms-row a {
      color: var(--accent);
      text-decoration: none;
    }
    .terms-row a:hover { text-decoration: underline; }

    /* ── Register Button ── */
    .btn-register {
      width: 100%;
      background: var(--bg-dark);
      border: none;
      color: var(--text-white);
      padding: 12px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 0.88rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 16px;
    }
    .btn-register:hover {
      background: #162340;
      transform: translateY(-1px);
    }

    /* ── Footer link ── */
    .card-footer-link {
      text-align: center;
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    .card-footer-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .card-footer-link a:hover { text-decoration: underline; }

    /* ── Error / Success ── */
    .msg-box {
      padding: 10px 13px;
      border-radius: var(--radius);
      font-size: 0.8rem;
      margin-bottom: 16px;
      display: none;
    }
    .msg-box.error {
      background: rgba(255,107,107,0.12);
      border: 1px solid rgba(255,107,107,0.3);
      color: #ff6b6b;
    }
    .msg-box.success {
      background: rgba(76,209,119,0.12);
      border: 1px solid rgba(76,209,119,0.3);
      color: #4cd177;
    }
    .msg-box.show { display: block; }

    @media (max-width: 500px) {
      .register-card { padding: 28px 20px; }
      .form-row { grid-template-columns: 1fr; gap: 0; }
    }
  </style>
</head>
<body>

  <div class="register-card">

    <!-- Header -->
    <div class="card-header-custom">
      <a href="index.html" class="logo-link">
        <div class="brand-icon"><i class="bi bi-diagram-3-fill"></i></div>
        OrgMember
      </a>
      <h1 class="card-title">Create Account</h1>
      <p class="card-subtitle">Sign up with email and start your journey</p>
    </div>

    <!-- Google Button -->
    <button class="btn-google" type="button">
      <span class="google-icon">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
      </span>
      Continue with Google
    </button>

    <!-- Divider -->
    <div class="divider">Or Register with Email</div>

    <!-- Error / Success messages -->
    <div class="msg-box error" id="errorMsg"></div>
    <div class="msg-box success" id="successMsg"></div>

    <!-- Form -->
    <form id="registerForm" onsubmit="handleRegister(event)">

      <!-- Row 1: Name + Email -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Name</label>
          <input type="text" class="form-control" id="fullname" placeholder="Shedi Moh" required />
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="email" placeholder="shedi@example.com" required />
        </div>
      </div>

      <!-- Row 2: Phone + Organization Name -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Phone No</label>
          <input type="tel" class="form-control" id="phone" placeholder="+251986858073" required />
        </div>
        <div class="form-group">
          <label class="form-label">Organization Name</label>
          <input type="text" class="form-control" id="org-name" placeholder="organ_name" required />
        </div>
      </div>

      <!-- Row 3: Organization Type + Plan -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Organization Type</label>
          <div class="select-wrapper">
            <select id="org-type" required>
              <option value="" disabled selected>Select Type</option>
              <option value="Corporate">Corporate</option>
              <option value="Non-Profit">Non-Profit</option>
              <option value="Government">Government</option>
              <option value="Startup">Startup</option>
              <option value="Educational">Educational</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Plan</label>
          <div class="select-wrapper">
            <select id="plan" required>
              <option value="" disabled selected>Select Plan</option>
              <option value="Basic">Basic</option>
              <option value="Pro">Pro</option>
              <option value="Enterprise">Enterprise</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Members Number — native spinner (up/down arrows) -->
      <div class="form-group">
        <label class="form-label">Members Numbers</label>
        <input
          type="number"
          class="form-control"
          id="members-count"
          value="1"
          min="1"
          max="10000"
        />
      </div>

      <!-- Row 4: Password + Confirm -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="password-wrapper">
            <input type="password" class="form-control" id="password" placeholder="••••••••" required />
            <button type="button" class="password-toggle" onclick="togglePassword('password', this)">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <div class="password-wrapper">
            <input type="password" class="form-control" id="confirm-password" placeholder="••••••••" required />
            <button type="button" class="password-toggle" onclick="togglePassword('confirm-password', this)">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
      </div>

      <!-- Register Button -->
      <button type="submit" class="btn-register">Register</button>

    </form>

    <!-- Footer -->
    <div class="card-footer-link">
      Already have an account? <a href="login.html">Login Here</a>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // Member Number Spinner
  function changeMembers(direction) {
    const input = document.getElementById('members-count');
    let val = parseInt(input.value) + direction;
    if (val < 1) val = 1;
    if (val > 10000) val = 10000;
    input.value = val;
  }

  // Password Show/Hide Toggle
  function togglePassword(fieldId, btn) {
    const field = document.getElementById(fieldId);
    const icon  = btn.querySelector('i');
    if (field.type === 'password') {
      field.type   = 'text';
      icon.className = 'bi bi-eye-slash';
    } else {
      field.type   = 'password';
      icon.className = 'bi bi-eye';
    }
  }

  // Form Submit — sends data to backend
  function handleRegister(event) {
    event.preventDefault();

    const full_name      = document.getElementById('fullname').value.trim();
    const email          = document.getElementById('email').value.trim();
    const phone          = document.getElementById('phone').value.trim();
    const org_name       = document.getElementById('org-name').value.trim();
    const org_type       = document.getElementById('org-type').value;
    const plan           = document.getElementById('plan').value;
    const members_limit  = document.getElementById('members-count').value;
    const password       = document.getElementById('password').value;
    const confirm        = document.getElementById('confirm-password').value;

    // Validation
    if (!full_name || !email || !phone || !org_name || !org_type || !plan || !password || !confirm) {
      showMsg('error', 'Please fill in all fields');
      return;
    }

    if (password.length < 6) {
      showMsg('error', 'Password must be at least 6 characters');
      return;
    }

    if (password !== confirm) {
      showMsg('error', 'Passwords do not match');
      return;
    }

    // Send to backend
    fetch('/api/auth/register', {
      method:      'POST',
      headers:     { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({
        full_name,
        email,
        phone,
        org_name,
        org_type,
        plan,
        members_limit,
        password
      })
    })
    .then(res => res.json())
    .then(data => {
      if (data.success) {
        showMsg('success', 'Account created! Redirecting to login...');
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1500);
      } else {
        showMsg('error', data.message);
      }
    })
    .catch(err => {
      showMsg('error', 'Cannot connect to server. Make sure backend is running!');
    });
  }

  function showMsg(type, text) {
    document.getElementById('errorMsg').classList.remove('show');
    document.getElementById('successMsg').classList.remove('show');

    const box = document.getElementById(type === 'error' ? 'errorMsg' : 'successMsg');
    box.textContent = text;
    box.classList.add('show');

    if (type === 'error') {
      setTimeout(() => box.classList.remove('show'), 5000);
    }
  }
</script>

</body>
</html>
